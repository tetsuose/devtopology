# DevTopology configuration
# Place this file at your project root.

# Where the file-contracts ledger lives (tracked in git)
ledger: docs/runtime/File-Contracts.json

# Where generated index artifacts go (gitignored)
index_dir: .index

# Glob patterns to exclude from indexing
exclude:
  - "vendor/"
  - "node_modules/"
  - ".cache/"
  - "dist/"
  - "build/"

# Branches that task-open will refuse to use
protected_branches:
  - main
  - master
  - develop
  - "release/*"

# Worktree root for task isolation (relative to repo root)
worktree_root: ../.worktrees

# Default base branch for task operations
base_branch: origin/main

# Default allowed stages for enforce-fill scope gate
fill_allowed_stages:
  - planned
  - implemented
  - verified
  - done

# Paths exempt from fill-scope enforcement (glob patterns)
fill_exempt:
  - "docs/runtime/File-Contracts.json"

# Credential planes (optional, advisory only — engine does not enforce these today).
# Document where runtime credentials live in your project so the registry in
# docs/runtime/Env-Registry.md has unambiguous plane labels to reference.
# See docs/runtime/Credentials-Management.md for the model.
#
# credential_planes:
#   - name: operator-control
#     path: <path to local operator config>
#     rule: "local operator reach/command only; no runtime secrets"
#   - name: runtime-sot
#     path: <live target path on deployed host>
#     rule: "edited only through explicit operator window on the live target"
#   - name: runtime-mirror
#     path: <local read-only copy path, gitignored>
#     rule: "pulled from runtime-sot; never hand-edited as authority"
#   - name: incoming-staging
#     path: <staging file path, gitignored, deleted after apply>
#     rule: "input only; classify, apply, validate, mirror-back, delete"
#   - name: consumer-specific
#     path: <per-consumer env file path>
#     rule: "scoped to one consumer; no cross-consumer keys"
